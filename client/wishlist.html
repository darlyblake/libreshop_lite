<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes favoris — LibreShop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
:root {
  --bg: #0a0c12;
  --bg-gradient: linear-gradient(145deg, #0a0c12 0%, #0e1018 100%);
  --card: rgba(22, 25, 34, 0.7);
  --card-hover: rgba(28, 32, 42, 0.9);
  --accent: #8b5cf6;
  --accent2: #06b6d4;
  --accent-glow: rgba(139, 92, 246, 0.2);
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --text: #ffffff;
  --text-soft: rgba(255, 255, 255, 0.65);
  --text-muted: rgba(255, 255, 255, 0.4);
  --border: rgba(255, 255, 255, 0.05);
  --border-hover: rgba(255, 255, 255, 0.12);
  --radius-lg: 28px;
  --radius-md: 18px;
  --radius-sm: 12px;
  --transition: 0.3s cubic-bezier(0.2, 0, 0, 1);
  --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-gradient);
  color: var(--text);
  min-height: 100vh;
}

/* ===== HEADER MODERNE ===== */
header {
  position: sticky;
  top: 20px;
  margin: 20px 30px 0;
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  background: rgba(10, 12, 18, 0.7);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

.logo {
  font-weight: 800;
  font-size: 1.3rem;
  background: linear-gradient(135deg, #fff, #cbd5e1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
  text-decoration: none;
}

.search {
  flex: 0 1 400px;
  position: relative;
  margin: 0 20px;
}

.search input {
  width: 100%;
  padding: 12px 48px 12px 20px;
  border-radius: 60px;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.03);
  color: white;
  font-size: 0.95rem;
  transition: var(--transition);
}

.search input:focus {
  outline: none;
  border-color: var(--accent);
  background: rgba(255, 255, 255, 0.05);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.search input::placeholder {
  color: var(--text-muted);
}

.search i {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-soft);
  font-size: 1rem;
  pointer-events: none;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.cart-btn {
  position: relative;
  color: var(--text-soft);
  font-size: 1.3rem;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  text-decoration: none;
  transition: var(--transition);
}

.cart-btn:hover {
  color: white;
  background: rgba(255, 255, 255, 0.08);
  border-color: var(--accent);
}

.cart-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  font-size: 0.7rem;
  font-weight: 700;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.user-btn {
  position: relative;
  color: var(--text-soft);
  font-size: 1.3rem;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  text-decoration: none;
  transition: var(--transition);
}

.user-btn:hover {
  color: white;
  background: rgba(255, 255, 255, 0.08);
  border-color: var(--accent);
}

.home-link {
  color: var(--text-soft);
  font-size: 1.3rem;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  text-decoration: none;
  transition: var(--transition);
}

.home-link:hover {
  color: white;
  background: rgba(255, 255, 255, 0.08);
  border-color: var(--accent);
  transform: scale(1.05);
}

/* ===== PAGE HEADER ===== */
.page-header {
  padding: 30px 30px 0;
}

.page-header-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
}

.page-title {
  display: flex;
  align-items: center;
  gap: 12px;
}

.page-title h1 {
  font-size: 1.8rem;
  font-weight: 700;
}

.page-title h1 i {
  color: var(--danger);
}

.wishlist-count {
  background: var(--card);
  padding: 6px 14px;
  border-radius: 60px;
  border: 1px solid var(--border);
  font-size: 0.9rem;
  color: var(--text-soft);
}

/* ===== WISHLIST GRID ===== */
.wishlist-container {
  padding: 30px;
}

.wishlist-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

/* Wishlist Item */
.wishlist-item {
  background: var(--card);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: var(--transition);
  position: relative;
}

.wishlist-item:hover {
  border-color: var(--border-hover);
  background: var(--card-hover);
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

.wishlist-remove {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(10, 12, 18, 0.8);
  border: 1px solid var(--border);
  color: var(--text-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition);
  z-index: 10;
}

.wishlist-remove:hover {
  background: var(--danger);
  border-color: var(--danger);
  color: white;
}

.wishlist-image {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.wishlist-content {
  padding: 20px;
}

.wishlist-store {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.wishlist-store img {
  width: 24px;
  height: 24px;
  border-radius: 50%;
}

.wishlist-store span {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.wishlist-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
  text-decoration: none;
  transition: color 0.2s;
  display: block;
}

.wishlist-title:hover {
  color: var(--accent);
}

.wishlist-rating {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
}

.wishlist-rating .stars {
  display: flex;
  gap: 2px;
  color: var(--warning);
  font-size: 0.85rem;
}

.wishlist-rating span {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.wishlist-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.wishlist-price {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent2);
}

.wishlist-old-price {
  font-size: 0.9rem;
  color: var(--text-muted);
  text-decoration: line-through;
  margin-left: 8px;
}

.add-to-cart-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 60px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  font-weight: 600;
  font-size: 0.9rem;
  border: none;
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
}

.add-to-cart-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px var(--accent-glow);
}

/* ===== EMPTY STATE ===== */
.empty-wishlist {
  text-align: center;
  padding: 80px 30px;
}

.empty-icon {
  font-size: 5rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}

.empty-wishlist h2 {
  font-size: 1.6rem;
  margin-bottom: 12px;
}

.empty-wishlist p {
  color: var(--text-muted);
  margin-bottom: 24px;
}

.empty-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 28px;
  border-radius: 60px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  font-weight: 600;
  text-decoration: none;
  transition: var(--transition);
}

.empty-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px var(--accent-glow);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  header {
    margin: 16px;
    padding: 10px 16px;
  }
  
  .search {
    flex: 1;
    margin: 0 10px;
  }
  
  .page-header {
    padding: 20px 16px 0;
  }
  
  .page-title h1 {
    font-size: 1.4rem;
  }
  
  .wishlist-container {
    padding: 20px 16px;
  }
  
  .wishlist-grid {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  
  .wishlist-image {
    height: 160px;
  }
  
  .wishlist-content {
    padding: 14px;
  }
  
  .wishlist-footer {
    flex-direction: column;
    gap: 12px;
    align-items: stretch;
  }
  
  .add-to-cart-btn {
    width: 100%;
    justify-content: center;
  }
}

@media (max-width: 480px) {
  .search {
    display: none;
  }
}
</style>
</head>
